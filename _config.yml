# Site settings
title: "kllmctrl"
description: "tech sharing"
baseurl: "/" # required if used under gh-pages branch, else (under master branch) just leave empty/blank
url: "https://kllmctrl.github.io"
author: "kllmctrl"


# Build settings
kramdown:
  input: GFM

# permalink: pretty
# permalink: /:categories/:title/
# permalink: /:categories/:year/:month/:day/:title:output_ext
permalink: /:year/:month/:day/:title.html

# Third-party services
# just leave empty to disable it
google_analytics: UA-64162955-2
disqus_shortname: 

plugins:
  - jekyll-sitemap

exclude: ["LICENSE", "README.md", "CNAME", "vendor", "Gemfile", "script"]

gems:
    -jekyll-seo-tag

sitemap:
  lastmod: 2020-09-28
  priority: 0.7
  changefreq: 'weekly'
  exclude: 'yes'
