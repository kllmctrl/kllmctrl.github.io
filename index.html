<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>kllmctrl - Home page</title>
    <link rel="stylesheet" type="text/css" href="assets/css/main.css"/>
    <script>
  (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
  (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
  m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
  })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');

  ga('create', 'UA-64162955-2', 'auto');
  ga('send', 'pageview', 'home_page');

</script>
</head>

<body>
<div class="vi">
    <div class="sidebar">
        <div class="header">
            <h1>kllmctrl</h1>
            <div class="quote">
                <p class="quote-text animate-init">古之立大事者，不惟有超世之才，亦必有坚忍不拔之志。</p>
                <p class="quote-author animate-init">《晁错论》—— <strong>苏轼</strong></p>
            </div>
        </div>
        <div class="menu">
            <a href="http://kllmctrl.github.io/blog" class="animate-init">Blog</a>
            <a href="http://kllmctrl.github.io/product" class="animate-init">Product</a>
        </div>
        <div class="location">
            <i class="location-icon"></i>
            <span class="location-text animate-init">GuangZhou - China</span>
        </div>
    </div>

    <div class="content">
        <span class="close">close</span>
    </div>
</div>
<script type="text/javascript" src="assets/vendors/jquery/index.js"></script>
<script>
    $(document).ready(function () {
        var delay = 1;
        var DELAY_STEP = 200;
        var animationOptions = { opacity: 1, top: 0};

        $('h1').animate(animationOptions).promise()
                .pipe(animateMain)
                .pipe(animateLocationIcon);

        function animateMain() {
            var dfd = $.Deferred();
            var els = $('.animate-init');
            var size = els.size();

            els.each(function (index, el) {
                delay++;
                $(el).delay(index * DELAY_STEP)
                        .animate(animationOptions);
                (size - 1 === index) && dfd.resolve();
            });
            return dfd.promise();
        }

        function animateLocationIcon() {
            $('.location-icon').delay(delay * DELAY_STEP).animate({
                opacity: 1,
                top: 0
            }).promise().done(animationQuote);
        }

        function animationQuote() {}
    });
</script>
</body>
</html>
