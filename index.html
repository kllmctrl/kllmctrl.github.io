        var hm = document.createElement("script");
        hm.src = "//hm.baidu.com/hm.js?1adfd7bbfc31025bde57c2e9cbaaa60d";

<body>
<div class="vi">
    <div class="sidebar">
        <div class="header">
            <h1>kllmctrl</h1>
            <div class="quote">
                <p class="quote-text animate-init">古之立大事者，不惟有超世之才，亦必有坚忍不拔之志。</p>
                <p class="quote-author animate-init">《晁错论》—— <strong>苏轼</strong></p>
            </div>
        </div>
        <div class="menu">
            <a href="" class="animate-init">Blog</a>
            <a href="" class="animate-init">App</a>
        </div>
        <div class="location">
            <i class="location-icon"></i>
            <span class="location-text animate-init">GuangZhou - China</span>
        </div>
    </div>

    <div class="content">
        <span class="close">close</span>
    </div>
</div>
<script type="text/javascript" src="assets/vendors/jquery/index.js"></script>
<script>
    $(document).ready(function () {
        var delay = 1;
        var DELAY_STEP = 200;
        var animationOptions = { opacity: 1, top: 0};

        $('h1').animate(animationOptions).promise()
                .pipe(animateMain)
                .pipe(animateLocationIcon);

        function animateMain() {
            var dfd = $.Deferred();
            var els = $('.animate-init');
            var size = els.size();

            els.each(function (index, el) {
                delay++;
                $(el).delay(index * DELAY_STEP)
                        .animate(animationOptions);
                (size - 1 === index) && dfd.resolve();
            });
            return dfd.promise();
        }

        function animateLocationIcon() {
            $('.location-icon').delay(delay * DELAY_STEP).animate({
                opacity: 1,
                top: 0
            }).promise().done(animationQuote);
        }

        function animationQuote() {}
    });
</script>
</body>
</html>
